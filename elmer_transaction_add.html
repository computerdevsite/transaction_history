<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add New Repair</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* BACK BUTTON STYLE */
        .btn-back {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .btn-back:active { transform: translateX(-5px); }

        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.2rem; margin-top: 0; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555; }
        input, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 16px; box-sizing: border-box; outline: none; background: #fff;
        }
        input:focus { border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.3); }

        .btn-submit { 
            width: 100%; padding: 15px; background: #27ae60; color: white; border: none; 
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
            -webkit-appearance: none;
        }
        .btn-submit:active { background: #219150; transform: scale(0.98); }
        
        .loading { display: none; text-align: center; color: #3498db; font-weight: bold; margin-top: 15px; font-size: 14px; }
        
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }

        @media (max-width: 480px) {
            .form-container { padding: 15px; }
            h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <a href="index.html" class="btn-back">
        <span style="font-size: 18px; margin-right: 5px;">←</span> Bumalik sa History
    </a>

    <h2>NEW TRANSACTION</h2>
    <form id="repairForm">
        <div class="row">
            <div class="input-group">
                <label>REPAIRED DATE</label>
                <input type="date" name="repairedDate" id="repairedDate" required>
            </div>
            <div class="input-group">
                <label>VALID UNTIL</label>
                <input type="date" name="validUntil" id="validUntil" required>
            </div>
        </div>

        <div class="input-group">
            <label>CUSTOMER NAME</label>
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <label>ADDRESS</label>
            <input type="text" name="address" placeholder="City / Area" required>
        </div>

        <div class="input-group">
            <label>CONTACT NUMBER</label>
            <input type="tel" name="contact" placeholder="09XX-XXX-XXXX" required>
        </div>

        <div class="input-group">
            <label>REMARK / WORK DONE</label>
            <textarea name="remark" rows="3" placeholder="Ano ang ginawa?"></textarea>
        </div>

        <div class="input-group">
            <label>TOTAL COST (₱)</label>
            <input type="number" name="totalCost" placeholder="0.00" step="any" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">SAVE TO DATABASE</button>
        <div class="loading" id="loader">Nagsesave sa Google Sheets...</div>
    </form>
</div>

<script>
    function formatDateForInput(date) {
        let d = new Date(date),
            month = '' + (d.getMonth() + 1),
            day = '' + d.getDate(),
            year = d.getFullYear();
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function formatDateForSheets(dateStr) {
        if(!dateStr) return "";
        const [year, month, day] = dateStr.split('-');
        return `${month}-${day}-${year}`;
    }

    window.onload = function() {
        const today = new Date();
        document.getElementById('repairedDate').value = formatDateForInput(today);
        const nextMonth = new Date();
        nextMonth.setMonth(nextMonth.getMonth() + 1);
        document.getElementById('validUntil').value = formatDateForInput(nextMonth);
    };

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyiS0gSO7450X0yMzXKmwx6i2ChCG3bO9gcRq6U8CTRVEca_Kr7OlYemdidlIz_F3oY6g/exec";

    document.getElementById('repairForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        btn.style.display = 'none';
        loader.style.display = 'block';

        const formData = {
            repairedDate: formatDateForSheets(this.repairedDate.value),
            validUntil: formatDateForSheets(this.validUntil.value),
            name: this.name.value,
            address: this.address.value,
            contact: this.contact.value,
            remark: this.remark.value,
            totalCost: this.totalCost.value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        }).then(() => {
            alert("✅ TRANSACTION SAVED!\nFormat: " + formData.repairedDate);
            this.reset();
            window.onload();
            btn.style.display = 'block';
            loader.style.display = 'none';
        }).catch(err => {
            alert("❌ Error: " + err);
            btn.style.display = 'block';
            loader.style.display = 'none';
        });
    });
</script>

</body>
</html>
